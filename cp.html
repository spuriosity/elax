<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <title>Hello, world!</title>

    <script src="/socket.io/socket.io.js"></script>
</head>

<body>

    <div class="container py-5">
        <h1>BOT</h1>
        <div class="row">
            <div class="col-md">
                <div>Zoom Meeting URL:</div>
                <input type="text" class="form-control meeting-url" placeholder="https://zoom.us/j/123456?pwd=abc">
            </div>
        </div>
        <div class="row">
            <div class="col-md mt-2 d-grid gap-2">
                <a class="btn btn-success btn-lg action-start-bot" type="button">Start Bot</a>
                <a class="btn btn-danger btn-lg action-stop-bot" type="button">Stop Bot</a>
            </div>
        </div>
        <div class="row mt-2">
            <div class="col-md">
                <span class="badge bg-secondary bot-status">Not running</span>
            </div>
        </div>

        <hr/>
        <h1>TIMER</h1>
        <div class="row">
            <div class="col-md">
                <div>Minutes:</div>
                <input type="number" class="form-control minutes" placeholder="Minutes" value="5">
            </div>
            <div class="col-md">
                <div>Seconds:</div>
                <input type="number" class="form-control seconds" placeholder="Seconds" value="0">
            </div>
        </div>
        <div class="row">
            <div class="col-md mt-2 d-grid gap-2">
                <a class="btn btn-primary btn-lg action-reset-timer" type="button">Reset</a>
                <a class="btn btn-secondary btn-lg action-stop-timer" type="button">Stop</a>
            </div>
        </div>

        <hr/>
        <h1>REACTIONS</h1>
        <div class="row">
            <div class="d-grid gap-2">
                <a class="btn btn-primary btn-lg action-enable-reactions" type="button">Enable Reactions</a>
                <a class="btn btn-secondary btn-lg action-disable-reactions" type="button">Disable Reactions</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script>
        var socket = io();
        socket.on('connect', function () {
            socket.emit('join', 'cp');
        });

        var auto_generated_id = '_' + Math.random().toString(36).substr(2, 9);


        document.querySelector('.action-reset-timer').addEventListener('click', e => {
            var seconds = parseInt(document.querySelector('.minutes').value) * 60 + parseInt(document.querySelector('.seconds').value);
            socket.emit('timerReset', seconds);
        });

        document.querySelector('.action-stop-timer').addEventListener('click', e => {
            socket.emit('timerReset', 1);
        });

        document.querySelector('.action-enable-reactions').addEventListener('click', e => {
            socket.emit('setReactionStatus', true);
        });

        document.querySelector('.action-disable-reactions').addEventListener('click', e => {
            socket.emit('setReactionStatus', false);
        });

        // Bot controls
        document.querySelector('.action-start-bot').addEventListener('click', e => {
            var url = document.querySelector('.meeting-url').value;
            if (!url) return;
            socket.emit('botStart', url);
        });

        document.querySelector('.action-stop-bot').addEventListener('click', e => {
            socket.emit('botStop');
        });

        socket.on('botStatus', function (data) {
            var badge = document.querySelector('.bot-status');
            var statusLabels = {
                'authenticating': 'Authenticating...',
                'authenticated': 'Authenticated',
                'joining': 'Joining meeting...',
                'in_meeting': 'In meeting',
                'mic_ready': 'Active - sending audio',
                'starting': 'Starting...',
                'already_running': 'Already running',
                'stopped': 'Stopped',
                'ended': 'Meeting ended',
                'error': data.message || 'Error'
            };
            var statusColors = {
                'authenticating': 'bg-warning',
                'authenticated': 'bg-success',
                'joining': 'bg-warning',
                'in_meeting': 'bg-success',
                'mic_ready': 'bg-success',
                'starting': 'bg-warning',
                'already_running': 'bg-warning',
                'stopped': 'bg-secondary',
                'ended': 'bg-secondary',
                'error': 'bg-danger'
            };

            badge.textContent = statusLabels[data.status] || data.status;
            badge.classList.remove('bg-secondary', 'bg-success', 'bg-warning', 'bg-danger');
            badge.classList.add(statusColors[data.status] || 'bg-secondary');
        });

    </script>
</body>

</html>
