services:
  elax:
    build: .
    container_name: elax
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT:-8081}:${APP_PORT:-8081}"
    env_file: .env
    environment:
      - APP_PORT=${APP_PORT:-8081}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${APP_PORT:-8081}/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
